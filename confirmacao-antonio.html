<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chá de Bebê · Antônio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --blue-deep: #2B4B6F;
    --blue-mid: #4A7BAF;
    --blue-soft: #A8C4E0;
    --blue-pale: #EAF2FA;
    --blue-wash: #F4F8FC;
    --white: #FDFEFF;
    --text: #1A2E42;
    --muted: #7A9BB5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--blue-wash);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* Soft background circles */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(168,196,224,0.25) 0%, transparent 70%);
    top: -100px; right: -100px;
  }
  body::after {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(74,123,175,0.12) 0%, transparent 70%);
    bottom: -80px; left: -80px;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
  }

  /* ── HERO ── */
  .hero {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.8s ease both;
  }

  .hero-eyebrow {
    font-size: 10px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--blue-mid);
    font-weight: 500;
    margin-bottom: 1.25rem;
    display: block;
  }

  .hero-icon {
    font-size: 36px;
    display: block;
    margin-bottom: 1rem;
    animation: float 3s ease-in-out infinite;
  }

  .hero-name {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(56px, 16vw, 88px);
    color: var(--blue-deep);
    line-height: 0.95;
    letter-spacing: -2px;
    margin-bottom: 0.5rem;
  }

  .hero-subtitle {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--blue-soft);
    letter-spacing: 0.3px;
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 2rem 0;
    animation: fadeUp 0.8s 0.1s ease both;
  }
  .divider-line { flex: 1; height: 1px; background: var(--blue-soft); opacity: 0.5; }
  .divider-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--blue-soft); }

  /* ── DETAILS ── */
  .details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 2rem;
    animation: fadeUp 0.8s 0.15s ease both;
  }

  .detail-card {
    background: var(--white);
    border: 1px solid rgba(168,196,224,0.4);
    border-radius: 14px;
    padding: 1.1rem 1rem;
    text-align: center;
  }

  .detail-card.full { grid-column: 1 / -1; }

  .detail-label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--blue-mid);
    font-weight: 500;
    display: block;
    margin-bottom: 6px;
  }

  .detail-value {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--blue-deep);
    line-height: 1.3;
  }

  .detail-value small {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
    display: block;
    margin-top: 2px;
  }

  /* ── COUNTER ── */
  .counter {
    display: flex;
    background: var(--blue-deep);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 2rem;
    animation: fadeUp 0.8s 0.2s ease both;
  }

  .counter-block {
    flex: 1;
    padding: 1.25rem;
    text-align: center;
  }

  .counter-block + .counter-block {
    border-left: 1px solid rgba(255,255,255,0.1);
  }

  .counter-num {
    font-family: 'DM Serif Display', serif;
    font-size: 44px;
    color: var(--white);
    display: block;
    line-height: 1;
    transition: transform 0.2s;
  }

  .counter-num.bump { transform: scale(1.2); }

  .counter-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--blue-soft);
    margin-top: 6px;
    display: block;
    opacity: 0.8;
  }

  /* ── FORM ── */
  .form-section {
    animation: fadeUp 0.8s 0.25s ease both;
  }

  .form-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--blue-deep);
    text-align: center;
    margin-bottom: 1.25rem;
  }

  .field {
    margin-bottom: 0.875rem;
  }

  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--blue-mid);
    font-weight: 500;
    margin-bottom: 7px;
  }

  .field input,
  .field select {
    width: 100%;
    background: var(--white);
    border: 1px solid rgba(168,196,224,0.5);
    border-radius: 10px;
    padding: 11px 15px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  .field input::placeholder { color: var(--muted); opacity: 0.6; }

  .field input:focus,
  .field select:focus {
    border-color: var(--blue-mid);
    box-shadow: 0 0 0 3px rgba(74,123,175,0.12);
  }

  .field select option { background: white; color: var(--text); }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .btn {
    width: 100%;
    margin-top: 0.75rem;
    padding: 14px;
    background: var(--blue-deep);
    border: none;
    border-radius: 10px;
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    color: var(--white);
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:hover { background: var(--blue-mid); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ── DEADLINE ── */
  .deadline {
    text-align: center;
    margin-top: 1.25rem;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
    animation: fadeUp 0.8s 0.3s ease both;
  }

  .deadline strong { color: var(--blue-mid); }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid rgba(168,196,224,0.3);
    animation: fadeUp 0.8s 0.35s ease both;
  }

  .footer p {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--blue-deep);
    color: var(--white);
    padding: 12px 24px;
    border-radius: 40px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-6px); }
  }

  @media (max-width: 400px) {
    .form-row { grid-template-columns: 1fr; }
    .details { grid-template-columns: 1fr; }
    .detail-card.full { grid-column: 1; }
  }
</style>
</head>
<body>

<div class="toast" id="toast">🍼 Presença confirmada!</div>

<div class="page">

  <!-- HERO -->
  <div class="hero">
    <span class="hero-eyebrow">Chá de Bebê</span>
    <span class="hero-icon">🍼</span>
    <p class="hero-name">Antônio</p>
    <p class="hero-subtitle">está a caminho</p>
  </div>

  <!-- DIVIDER -->
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-dot"></div>
    <div class="divider-line"></div>
  </div>

  <!-- DETAILS -->
  <div class="details">
    <div class="detail-card">
      <span class="detail-label">Data</span>
      <div class="detail-value">25 de Julho<small>Sábado · 2026</small></div>
    </div>
    <div class="detail-card">
      <span class="detail-label">Horário</span>
      <div class="detail-value">A confirmar<small>em breve</small></div>
    </div>
    <div class="detail-card full">
      <span class="detail-label">Local</span>
      <div class="detail-value">A confirmar<small>em breve</small></div>
    </div>
  </div>

  <!-- COUNTER -->
  <div class="counter">
    <div class="counter-block">
      <span class="counter-num" id="cnt-rsvp">0</span>
      <span class="counter-label">Confirmações</span>
    </div>
    <div class="counter-block">
      <span class="counter-num" id="cnt-total">0</span>
      <span class="counter-label">Pessoas</span>
    </div>
  </div>

  <!-- FORM -->
  <div class="form-section">
    <p class="form-title">Confirme sua presença</p>

    <div class="field">
      <label>Seu nome completo</label>
      <input type="text" id="f-name" placeholder="Ex: Maria da Silva" autocomplete="name" />
    </div>

    <div class="form-row">
      <div class="field">
        <label>WhatsApp</label>
        <input type="tel" id="f-phone" placeholder="(00) 00000-0000" autocomplete="tel" />
      </div>
      <div class="field">
        <label>Quantas pessoas?</label>
        <select id="f-count">
          <option value="1">Só eu (1)</option>
          <option value="2">2 pessoas</option>
          <option value="3">3 pessoas</option>
          <option value="4">4 pessoas</option>
          <option value="5">5 ou mais</option>
        </select>
      </div>
    </div>

    <button class="btn" id="btn-confirm" onclick="confirmar()">Confirmar presença</button>
  </div>

  <!-- DEADLINE -->
  <p class="deadline">Confirme sua presença até <strong>15 de julho de 2026</strong></p>

  <!-- FOOTER -->
  <div class="footer">
    <p>Com amor · Família Antônio 🍼</p>
  </div>

</div>

<script>
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzQaLFNdRHlvhxjTggBCNDiLqWvm1QhM3yRAzDkkLisY9A-SwBktWhqXxnlgie0RBSO/exec';

  async function confirmar() {
    const name = document.getElementById('f-name').value.trim();
    const phone = document.getElementById('f-phone').value.trim();
    const count = parseInt(document.getElementById('f-count').value);
    const btn = document.getElementById('btn-confirm');

    if (!name) {
      const input = document.getElementById('f-name');
      input.focus();
      input.style.borderColor = '#E24B4A';
      input.style.boxShadow = '0 0 0 3px rgba(226,75,74,0.15)';
      setTimeout(() => {
        input.style.borderColor = '';
        input.style.boxShadow = '';
      }, 1500);
      return;
    }

    btn.textContent = 'Enviando...';
    btn.disabled = true;

    try {
      await fetch(SHEET_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome: name, whatsapp: phone, pessoas: count })
      });

      // Update counters locally
      const rsvpEl = document.getElementById('cnt-rsvp');
      const totalEl = document.getElementById('cnt-total');
      rsvpEl.textContent = parseInt(rsvpEl.textContent) + 1;
      totalEl.textContent = parseInt(totalEl.textContent) + count;
      [rsvpEl, totalEl].forEach(el => {
        el.classList.add('bump');
        setTimeout(() => el.classList.remove('bump'), 300);
      });

      clearForm();
      showToast();
    } catch (err) {
      alert('Erro ao confirmar. Tente novamente.');
    } finally {
      btn.textContent = 'Confirmar presença';
      btn.disabled = false;
    }
  }

  function clearForm() {
    document.getElementById('f-name').value = '';
    document.getElementById('f-phone').value = '';
    document.getElementById('f-count').value = '1';
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }
</script>

</body>
</html>
